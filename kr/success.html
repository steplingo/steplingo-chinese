<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>購入が完了しました</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 40px;
      text-align: center;
      line-height: 1.6;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      margin: 8px 0;
    }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 24px;
      background: #2ecc71;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>🎉 ご購入ありがとうございます！</h2>
  <p>Steplingo Korean プレミアム版が有効になりました。</p>
  <p>数秒後にアプリに自動で戻ります。</p>

  <a class="btn" href="/kr/#home">アプリに戻る</a>

  <script>
    (function () {
      try {
        localStorage.setItem("steplingo_pro_korean", "true");
        localStorage.removeItem("premium");
        localStorage.removeItem("userHasPro");
        console.log("[Steplingo KR] Purchase success! steplingo_pro_korean = true");
      } catch (e) {
        console.error("Failed to set PRO flag:", e);
      }

      window.location.replace("/kr/#home");
    })();
  </script>
</body>
</html>
